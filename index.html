<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>易經金錢卦占卜器</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f4f1ea;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        h1, h2 {
            text-align: center;
            color: #5c3d2e;
        }
        .container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .warning-box {
            background-color: #fffaf0;
            border: 1px solid #e2d4b7;
            border-left: 5px solid #c68b59;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        .warning-box h3 {
            margin-top: 0;
            color: #865439;
            font-size: 16px;
        }
        .warning-box ul {
            margin: 0;
            padding-left: 20px;
            font-size: 14px;
            line-height: 1.6;
            color: #555;
        }
        .question-box {
            margin: 20px 0;
        }
        .question-box label {
            display: block;
            font-weight: bold;
            color: #5c3d2e;
            margin-bottom: 8px;
        }
        .question-box input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            background-color: #fafafa;
        }
        .question-box input:focus {
            border-color: #865439;
            outline: none;
            background-color: #fff;
        }
        .btn-container {
            text-align: center;
            margin: 20px 0;
        }
        button {
            background-color: #865439;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #c68b59;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .coins {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 25px 0;
            font-size: 24px;
            perspective: 1000px; /* 啟用3D透視 */
        }
        .coin {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background-color: #ffd700;
            border: 3px solid #daa520;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            color: #8b6508;
            transition: transform 0.6s ease-out;
        }
        .coin.back {
            background-color: #e5e5e5;
            border-color: #b5b5b5;
            color: #666;
        }
        
        /* 新增：硬幣轉動的動畫樣式 */
        @keyframes spin {
            0% { transform: translateY(0) rotateX(0deg); }
            50% { transform: translateY(-50px) rotateX(900deg); } /* 往上彈跳並瘋狂翻轉 */
            100% { transform: translateY(0) rotateX(1800deg); }
        }
        .coin.spinning {
            animation: spin 0.6s ease-out;
        }

        .hexagram-display {
            margin-top: 20px;
            display: flex;
            flex-direction: column-reverse; /* 由下往上畫 */
            align-items: center;
            gap: 8px;
        }
        .line {
            font-family: monospace;
            font-size: 20px;
            letter-spacing: 2px;
        }
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #f9f6f0;
            border-left: 5px solid #865439;
            display: none;
        }
        .copy-btn {
            background-color: #4a5568;
            font-size: 14px;
            padding: 6px 12px;
            margin-top: 15px;
        }
        .copy-btn:hover {
            background-color: #718096;
        }
    </style>
</head>
<body>

    <h1>🔮 易經金錢卦占卜</h1>
    
    <div class="warning-box">
        <h3>💡 占卜前須知：易學三大心態</h3>
        <ul>
            <li><strong>不誠不占：</strong>心不誠、抱著好玩試探的心態，算出來往往不準。</li>
            <li><strong>不疑不占：</strong>已經知道答案、或者心中沒有真正疑惑的事情，不需要占卜。</li>
        </ul>
    </div>

    <div class="container">
        <div class="question-box">
            <label for="user-question">❓ 請輸入您想請教的問題（選填，方便整合複製）：</label>
            <input type="text" id="user-question" placeholder="例如：這週面試新工作的發展順利嗎？">
        </div>

        <div class="btn-container">
            <button id="toss-btn" onclick="tossCoins()">擲硬幣 (<span id="count">0</span>/6)</button>
            <button id="reset-btn" onclick="resetAll()" style="background-color: #777; margin-left: 10px;">重來</button>
        </div>

        <div class="coins" id="coins-display" style="display: none;">
            <div class="coin" id="coin1">-</div>
            <div class="coin" id="coin2">-</div>
            <div class="coin" id="coin3">-</div>
        </div>

        <h3 style="text-align: center; margin-top: 30px;">目前卦象 (由下往上記錄)</h3>
        <div class="hexagram-display" id="hexagram">
            </div>

        <div class="result-box" id="result">
            <h2>占卜結果分析</h2>
            <div id="result-text"></div>
            <div style="text-align: right;">
                <button class="copy-btn" id="copy-btn" onclick="copyToClipboard()">📋 複製問題與結果（發給AI分析）</button>
            </div>
        </div>
    </div>

    <script>
        let history = []; 
        let rawLinesText = []; 
        let finalAdviceText = ""; 
        let isSpinning = false; // 防連點狀態

        function tossCoins() {
            if (history.length >= 6 || isSpinning) return;

            isSpinning = true;
            let tossBtn = document.getElementById("toss-btn");
            tossBtn.disabled = true; // 動畫期間停用按鈕

            // 隨機產生最後結果 (0反, 1正)
            let c1 = Math.floor(Math.random() * 2);
            let c2 = Math.floor(Math.random() * 2);
            let c3 = Math.floor(Math.random() * 2);

            let coin1 = document.getElementById("coin1");
            let coin2 = document.getElementById("coin2");
            let coin3 = document.getElementById("coin3");

            // 顯示硬幣區塊並加上旋轉動畫效果
            document.getElementById("coins-display").style.display = "flex";
            coin1.classList.add("spinning");
            coin2.classList.add("spinning");
            coin3.classList.add("spinning");
            
            // 轉動時先顯示問號
            coin1.innerText = "?"; coin2.innerText = "?"; coin3.innerText = "?";
            coin1.classList.remove("back"); coin2.classList.remove("back"); coin3.classList.remove("back");

            // 0.6 秒後動畫結束，揭曉正反面並結算卦象
            setTimeout(() => {
                coin1.classList.remove("spinning");
                coin2.classList.remove("spinning");
                coin3.classList.remove("spinning");

                updateCoinDOM("coin1", c1);
                updateCoinDOM("coin2", c2);
                updateCoinDOM("coin3", c3);

                let score = (c1 ? 3 : 2) + (c2 ? 3 : 2) + (c3 ? 3 : 2);
                history.push(score);

                document.getElementById("count").innerText = history.length;

                renderHexagram();

                isSpinning = false;
                
                if (history.length < 6) {
                    tossBtn.disabled = false; // 恢復按鈕
                } else {
                    analyzeResult();
                }
            }, 600);
        }

        function updateCoinDOM(id, val) {
            let el = document.getElementById(id);
            if (val === 1) {
                el.innerText = "正";
                el.classList.remove("back");
            } else {
                el.innerText = "反";
                el.classList.add("back");
            }
        }

        function renderHexagram() {
            let hexDiv = document.getElementById("hexagram");
            hexDiv.innerHTML = ""; 
            rawLinesText = []; 

            history.forEach((score, index) => {
                let lineStr = "";
                let name = "";

                if (score === 7) { lineStr = "———————"; name = "少陽 (不變)"; }
                else if (score === 8) { lineStr = "———  ———"; name = "少陰 (不變)"; }
                else if (score === 9) { lineStr = "———————  O"; name = "老陽 (變爻)"; }
                else if (score === 6) { lineStr = "———  ———  X"; name = "老陰 (變爻)"; }

                hexDiv.innerHTML += `<div class="line">第 ${index + 1} 爻：${lineStr} <span>(${name})</span></div>`;
                rawLinesText.push(`第 ${index + 1} 爻：${lineStr} (${name})`);
            });
        }

        function analyzeResult() {
            let changeLines = [];
            history.forEach((score, index) => {
                if (score === 6 || score === 9) {
                    changeLines.push(index + 1);
                }
            });

            let resultDiv = document.getElementById("result");
            let resultText = document.getElementById("result-text");
            resultDiv.style.display = "block";

            let adviceHTML = `<strong>變爻數量：${changeLines.length} 個</strong><br><br>`;
            adviceHTML += `根據宋代朱熹的《易學啟蒙》解卦黃金法則，你應該看：<br><br>`;

            let adviceRaw = `變爻數量：${changeLines.length} 個\n根據宋代朱熹的《易學啟蒙》解卦黃金法則，解卦核心指引如下：\n`;

            if (changeLines.length === 0) {
                let t = `👉 請查閱：【本卦的卦辭】。\n目前大局非常穩定，事情的吉凶完全由本卦的總體評語決定。`;
                adviceHTML += t.replace(/\n/g, '<br>').replace('👉', '👉 <strong>').replace('】。', '】</strong>。');
                adviceRaw += t;
            } else if (changeLines.length === 1) {
                let t = `👉 請查閱：【本卦第 ${changeLines[0]} 爻的爻辭】。\n這句話是事情發展的關鍵轉折點！`;
                adviceHTML += t.replace(/\n/g, '<br>').replace('👉', '👉 <strong>').replace('】。', '】</strong>。');
                adviceRaw += t;
            } else if (changeLines.length === 2) {
                let t = `👉 請查閱：【本卦第 ${changeLines[0]} 爻 與 第 ${changeLines[1]} 爻 的爻辭】。\n並以 位置在上（第 ${changeLines[1]} 爻）的爻辭為主，下方的爻辭為輔。`;
                adviceHTML += t.replace(/\n/g, '<br>').replace('👉', '👉 <strong>').replace('】。', '】</strong>。');
                adviceRaw += t;
            } else if (changeLines.length === 3) {
                let t = `👉 請查閱：【本卦的卦辭】與【變卦的卦辭】。\n事情正處於劇烈演變的中途，本卦代表現在，變卦代表未來，兩者各佔一半比重。`;
                adviceHTML += t.replace(/\n/g, '<br>').replace('👉', '👉 <strong>').replace('】。', '】</strong>。');
                adviceRaw += t;
            } else if (changeLines.length === 4) {
                let noChangeLines = [];
                for(let i=1; i<=6; i++) { if(!changeLines.includes(i)) noChangeLines.push(i); }
                let t = `👉 請查閱：【變卦中，沒變的第 ${noChangeLines[0]} 爻 與 第 ${noChangeLines[1]} 爻 的爻辭】。\n並以 位置在下（第 ${noChangeLines[0]} 爻）的爻辭為主。`;
                adviceHTML += t.replace(/\n/g, '<br>').replace('👉', '👉 <strong>').replace('】。', '】</strong>。');
                adviceRaw += t;
            } else if (changeLines.length === 5) {
                let noChangeLine = 0;
                for(let i=1; i<=6; i++) { if(!changeLines.includes(i)) noChangeLine = i; }
                let t = `👉 請查閱：【變卦中，唯一沒變的第 ${noChangeLine} 爻 的爻辭】。`;
                adviceHTML += t.replace(/\n/g, '<br>').replace('👉', '👉 <strong>').replace('】。', '】</strong>。');
                adviceRaw += t;
            } else if (changeLines.length === 6) {
                let t = `👉 請查閱：【變卦的卦辭】。\n情況發生了徹底的乾坤大挪移！(註：若本卦為乾卦或坤卦，則改看「用九」或「用六」的爻辭)。`;
                adviceHTML += t.replace(/\n/g, '<br>').replace('👉', '👉 <strong>').replace('】。', '】</strong>。');
                adviceRaw += t;
            }

            resultDiv.scrollIntoView({ behavior: 'smooth' }); // 自動平滑滾動到結果區
            resultText.innerHTML = adviceHTML;
            finalAdviceText = adviceRaw; 
        }

        function copyToClipboard() {
            let orderedLines = [...rawLinesText].reverse().join("\n");
            let question = document.getElementById("user-question").value.trim();
            if (!question) { question = "（未填寫具體問題）"; }
            
            let textToCopy = `【易經金錢卦 AI 占卜分析請求】\n\n`;
            textToCopy += `❓ 占卜問題：\n${question}\n\n`;
            textToCopy += `☯️ 卦象紀錄（由上至下排列，即第6爻到第1爻）：\n${orderedLines}\n\n`;
            textToCopy += `📝 朱熹解卦核心指引：\n${finalAdviceText}\n\n`;
            textToCopy += `請 AI 助手根據以上問題、得到的卦象以及解卦指引，為我詳細解讀本卦、變卦的含意，並給出具體的建議。謝謝！\n\n`;
            textToCopy += `（占卜時間：${new Date().toLocaleString()}）`;

            navigator.clipboard.writeText(textToCopy).then(() => {
                let copyBtn = document.getElementById("copy-btn");
                copyBtn.innerText = "✅ 複製成功！可直接貼給 AI";
                copyBtn.style.backgroundColor = "#2f855a"; 
                
                setTimeout(() => {
                    copyBtn.innerText = "📋 複製問題與結果（發給AI分析）";
                    copyBtn.style.backgroundColor = "#4a5568";
                }, 2000);
            }).catch(err => {
                alert("複製失敗，請手動全選文字複製。");
            });
        }

        function resetAll() {
            history = [];
            rawLinesText = [];
            finalAdviceText = "";
            isSpinning = false;
            document.getElementById("user-question").value = ""; 
            document.getElementById("count").innerText = "0";
            document.getElementById("hexagram").innerHTML = "";
            document.getElementById("result").style.display = "none";
            document.getElementById("coins-display").style.display = "none";
            document.getElementById("toss-btn").disabled = false;
        }
    </script>
</body>
</html>
